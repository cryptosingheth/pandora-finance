<!doctype html>
<meta charset="utf-8">
<title>Propty Agent — Agentic Rental Marketplace</title>
<style>
  :root{
    --bg:#f6f8fc; --surface:#ffffff; --surface-2:#f4f7fc; --panel:#f7f9fc;
    --ink:#172b4d; --ink-2:#5a6a85; --ink-3:#8b94ab;
    --line:#e6eaf2; --line-2:#eef1f7;
    --blue:#006cff; --blue-ink:#0052cc; --blue-bg:#e9f1ff;
    --green:#0a7057; --green-ink:#005843; --green-bg:#e7f1ee;
    --teal:#005843; --teal-ink:#00382b; --teal-bg:#e7f1ee;
    --violet:#5b5bd6; --violet-bg:#ecebfb;
    --amber:#a4670a; --amber-bg:#fbf0dd;
    --red:#e03131;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
    --r:14px; --shadow:0 6px 22px rgba(15,27,51,.08); --ws-shadow:0 10px 30px rgba(16,32,64,.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* top bar */
  .top{display:flex;align-items:center;gap:14px;padding:12px 18px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:1.1rem}
  .brand .m{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#005843,#0a7057);display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 4px 12px rgba(0,88,67,.34)}
  .agent-badge{display:inline-flex;align-items:center;gap:7px;font-size:.74rem;font-weight:700;color:var(--teal);background:var(--teal-bg);padding:5px 11px;border-radius:999px}
  .agent-badge .pulse{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,88,67,.5)}70%{box-shadow:0 0 0 7px rgba(0,88,67,0)}100%{box-shadow:0 0 0 0 rgba(0,88,67,0)}}
  .top .demo{margin-left:auto;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--ink-3);border:1px dashed var(--line);padding:5px 9px;border-radius:8px}
  .top .reset{border:1px solid var(--line);background:#fff;color:var(--ink-2);font-weight:600;font-size:.82rem;padding:7px 13px;border-radius:9px;cursor:pointer}
  .top .reset:hover{border-color:var(--ink-3);color:var(--ink)}

  /* split */
  .split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);height:calc(100vh - 53px)}
  @media(max-width:820px){.split{grid-template-columns:1fr;height:auto}}

  /* chat */
  .chat{display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:0;background:var(--surface)}
  .chat-scroll{flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:16px}
  @media(max-width:820px){.chat-scroll{height:56vh}}
  .msg{display:flex;gap:11px;max-width:92%}
  .msg .av{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;font-size:.8rem}
  .msg.agent .av{background:var(--violet-bg);color:var(--violet)}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.user .av{background:var(--ink);color:#fff}
  .bubble{padding:12px 15px;border-radius:14px;font-size:.95rem}
  .msg.agent .bubble{background:var(--surface-2);border:1px solid var(--line);border-top-left-radius:5px}
  .msg.user .bubble{background:var(--blue);color:#fff;border-top-right-radius:5px}
  .typing{display:inline-flex;gap:4px;padding:14px 15px}
  .typing i{width:7px;height:7px;border-radius:50%;background:var(--ink-3);animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .prompts{border-top:1px solid var(--line);padding:14px 16px;display:flex;flex-direction:column;gap:10px;background:var(--surface)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);font-family:inherit;font-size:.86rem;font-weight:500;padding:9px 13px;border-radius:999px;cursor:pointer;text-align:left;transition:.15s}
  .chip:hover{border-color:var(--teal);color:var(--teal-ink);background:var(--teal-bg)}
  .chip[disabled]{opacity:.4;cursor:default}
  .fauxin{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--ink-3);font-size:.9rem;background:var(--surface-2)}
  .fauxin .snd{margin-left:auto;width:28px;height:28px;border-radius:8px;background:var(--ink);display:grid;place-items:center;color:#fff}

  /* workspace */
  .ws{background:var(--panel);color:var(--ink);min-height:0;display:flex;flex-direction:column;border-left:1px solid var(--line)}
  .ws-head{display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:.9rem;color:var(--ink)}
  .ws-head .k{font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
  .ws-scroll{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
  @media(max-width:820px){.ws-scroll{height:60vh}}
  .ws-empty{color:var(--ink-3);font-size:.9rem;text-align:center;margin:auto;max-width:34ch}

  .act{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#ffffff;box-shadow:var(--ws-shadow);opacity:0;transform:translateY(8px);animation:rise .35s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .act-head{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line-2)}
  .act-call{font-family:var(--mono);font-size:.8rem;color:var(--ink-2);word-break:break-word}
  .act-call .fn{color:var(--teal-ink);font-weight:600}
  .dotspin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,88,67,.22);border-top-color:var(--teal);animation:spin .7s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ok{width:16px;height:16px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:11px;flex:none}
  .act-body{padding:13px 14px;display:flex;flex-direction:column;gap:9px}

  .rroom{display:flex;align-items:center;gap:11px;font-size:.86rem}
  .rroom .th{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#d7e3f7,#c3d4ef);flex:none}
  .rroom .price{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--ink)}
  .rroom .meta{color:var(--ink-2);font-size:.78rem}
  .rroom.best{border:1px solid rgba(18,184,134,.4);background:var(--green-bg);border-radius:9px;padding:9px 11px}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;font-weight:700;padding:5px 10px;border-radius:999px}
  .p-green{background:var(--green-bg);color:var(--green-ink)}
  .p-blue{background:var(--blue-bg);color:var(--blue-ink)}
  .p-amber{background:var(--amber-bg);color:var(--amber)}
  .kv{display:flex;justify-content:space-between;font-size:.85rem;color:var(--ink-2);gap:12px}
  .kv b{color:var(--ink);font-family:var(--mono);font-weight:700}
  .lease{border-top:1px dashed var(--line);margin-top:2px;padding-top:9px;display:flex;flex-direction:column;gap:7px}
  .doc{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;background:var(--surface-2);border:1px solid var(--line);padding:6px 10px;border-radius:8px;color:var(--ink-2)}
  .doc .c{color:var(--green-ink)}
  .wrapchips{display:flex;flex-wrap:wrap;gap:7px}

  /* calendar viewing slot */
  .cal{display:flex;flex-direction:column;gap:8px}
  .cal .slot{display:flex;align-items:center;gap:10px;font-size:.85rem;border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink-2)}
  .cal .slot.pick{border-color:rgba(0,88,67,.4);background:var(--teal-bg);color:var(--teal-ink);font-weight:600}
  .cal .slot .cwhen{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--ink)}
  .cal .slot .cdot{width:9px;height:9px;border-radius:50%;background:var(--teal);flex:none}

  /* zero-knowledge proof card */
  .zk-proof{display:flex;flex-direction:column;gap:11px}
  .zk-row{display:flex;align-items:center;gap:9px;font-size:.85rem;color:var(--ink-2)}
  .zk-row .zk-ic{width:24px;height:24px;border-radius:7px;background:var(--teal-bg);color:var(--teal);display:grid;place-items:center;flex:none}
  .zk-row .zk-ic svg{width:13px;height:13px}
  .zk-row b{color:var(--ink);font-weight:600}
  .zk-row .yn{margin-left:auto;font-family:var(--mono);font-weight:700;color:var(--green-ink)}
  .zk-banner{display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:600;color:var(--teal-ink);
    background:var(--teal-bg);border:1px solid rgba(0,88,67,.2);border-radius:9px;padding:9px 11px;margin-top:2px}
  .zk-banner .lk{width:16px;height:16px;flex:none}
  .hashrow{font-family:var(--mono);font-size:.78rem;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);
    border-radius:8px;padding:8px 11px;word-break:break-all}
  .hashrow b{color:var(--teal-ink)}

  .foot{padding:9px 20px;font-size:.72rem;color:var(--ink-3);border-top:1px solid var(--line)}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:8px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="top">
  <div class="brand"><span class="m">P</span>Propty</div>
  <span class="agent-badge"><span class="pulse"></span>AI Leasing Agent</span>
  <span class="demo">LIVE DEMO</span>
  <button class="reset" id="reset">Reset</button>
</div>

<div class="split">
  <section class="chat">
    <div class="chat-scroll" id="chat"></div>
    <div class="prompts">
      <div class="chips" id="chips"></div>
      <div class="fauxin">Ask the Propty agent…<span class="snd"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></div>
    </div>
  </section>

  <section class="ws">
    <div class="ws-head"><span class="k">Agent workspace</span> <span id="ws-status">idle</span></div>
    <div class="ws-scroll" id="ws"><div class="ws-empty" id="ws-empty">The agent's actions appear here as it works — searching, screening, drafting, guaranteeing.</div></div>
    <div class="foot">Illustrative demo · Propty by Aconomy Labs Inc. · actions and data are simulated</div>
  </section>
</div>

<script>
  var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  var chat=document.getElementById('chat'), ws=document.getElementById('ws'), chips=document.getElementById('chips');
  var wsEmpty=document.getElementById('ws-empty'), wsStatus=document.getElementById('ws-status');

  function el(t,c,txt){var e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.appendChild(document.createTextNode(txt));return e;}
  var SVGNS='http://www.w3.org/2000/svg';
  function makeSvgEl(){return document.createElementNS(SVGNS,'svg');}
  function svgPath(d){var p=document.createElementNS(SVGNS,'path');p.setAttribute('d',d);return p;}
  // quick single-path check/tick svg for inline icons
  function makeSvg(d){
    var s=makeSvgEl();
    s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');
    s.setAttribute('stroke-width','3');s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
    s.appendChild(svgPath(d));return s;
  }
  function clr(n){while(n.firstChild)n.removeChild(n.firstChild);}
  function scrollC(){chat.scrollTop=chat.scrollHeight;}
  function scrollW(){ws.scrollTop=ws.scrollHeight;}

  // ---- queue player ----
  var Q=[], busy=false;
  function q(fn,delay){Q.push({fn:fn,delay:delay==null?600:delay});if(!busy)deq();}
  function deq(){if(!Q.length){busy=false;wsStatus.textContent='done';return;}busy=true;var b=Q.shift();setTimeout(function(){b.fn();deq();},reduce?0:b.delay);}

  // ---- chat ----
  function userMsg(text){var m=el('div','msg user');m.appendChild(el('span','av','You'));m.appendChild(el('div','bubble',text));chat.appendChild(m);scrollC();}
  function agentMsg(text){var m=el('div','msg agent');m.appendChild(el('span','av','AI'));m.appendChild(el('div','bubble',text));chat.appendChild(m);scrollC();}
  function typing(){var m=el('div','msg agent');m.appendChild(el('span','av','AI'));var b=el('div','bubble typing');b.appendChild(el('i'));b.appendChild(el('i'));b.appendChild(el('i'));m.appendChild(b);chat.appendChild(m);scrollC();return m;}
  function say(text,delay){q(function(){var t=typing();q(function(){chat.removeChild(t);agentMsg(text);},reduce?0:520);},delay);}

  // ---- workspace actions ----
  function actionCard(fnName,args){
    if(wsEmpty&&wsEmpty.parentNode)wsEmpty.parentNode.removeChild(wsEmpty);
    var card=el('div','act');
    var head=el('div','act-head');
    var spin=el('span','dotspin');
    var call=el('code','act-call');
    call.appendChild(function(){var s=el('span','fn',fnName);return s;}());
    call.appendChild(document.createTextNode('('+args+')'));
    head.appendChild(spin);head.appendChild(call);card.appendChild(head);
    ws.appendChild(card);scrollW();
    return {card:card,spin:spin};
  }
  function complete(ref,resultNode){
    var ok=el('span','ok','✓');ref.spin.parentNode.replaceChild(ok,ref.spin);
    if(resultNode){var b=el('div','act-body');b.appendChild(resultNode);ref.card.appendChild(b);scrollW();}
  }
  // an "agent action": show running call, then complete with result
  function act(fnName,args,buildResult,runMs){
    q(function(){wsStatus.textContent='working…';var ref=actionCard(fnName,args);
      q(function(){complete(ref,buildResult?buildResult():null);},reduce?0:(runMs||720));
    });
  }

  // ---- result builders ----
  function rooms(list,bestIdx){
    var wrap=el('div');
    list.forEach(function(r,i){
      var row=el('div','rroom'+(i===bestIdx?' best':''));
      row.appendChild(el('span','th'));
      var mid=el('div');mid.appendChild(el('div',null,r.name));var meta=el('div','meta',r.meta);mid.appendChild(meta);
      row.appendChild(mid);
      row.appendChild(el('span','price',r.tag));
      if(i===bestIdx){var p=el('span','pill p-green');p.appendChild(document.createTextNode('best match'));row.appendChild(p);}
      wrap.appendChild(row);
    });
    return wrap;
  }
  function verified(){
    var w=el('div');
    var chipsw=el('div','wrapchips');
    ['Passport','Job offer','Bank statements','Overseas reference'].forEach(function(d){var c=el('span','doc');c.appendChild(el('span','c','✓'));c.appendChild(document.createTextNode(' '+d));chipsw.appendChild(c);});
    w.appendChild(chipsw);
    var p=el('div');p.style.marginTop='9px';
    var a=el('span','pill p-green');a.appendChild(document.createTextNode('Verified — no Canadian credit needed'));
    var b=el('span','pill p-blue');b.style.marginLeft='7px';b.appendChild(document.createTextNode('Held privately by the agent'));
    p.appendChild(a);p.appendChild(b);w.appendChild(p);return w;
  }
  function lease(){
    var w=el('div');
    [['Room','Room 2 · 21 Fern Ave, Toronto'],['Term','12 months'],['Template','Ontario Standard (govt)'],['Prefilled from','Verified tenant details']].forEach(function(kv){
      var r=el('div','kv');r.appendChild(el('span',null,kv[0]));r.appendChild(el('b',null,kv[1]));w.appendChild(r);
    });
    var l=el('div','lease');
    var p1=el('span','pill p-green');p1.appendChild(document.createTextNode('Ontario Standard Lease · RTA-compliant'));
    var p2=el('span','pill p-blue');p2.appendChild(document.createTextNode('e-signed by both parties'));
    l.appendChild(p1);l.appendChild(p2);w.appendChild(l);return w;
  }
  // calendar viewing slots
  function calendar(){
    var w=el('div','cal');
    var slots=[['Sat','10:00 AM',true],['Sun','2:30 PM',false],['Mon','6:00 PM',false]];
    slots.forEach(function(s){
      var row=el('div','slot'+(s[2]?' pick':''));
      if(s[2])row.appendChild(el('span','cdot'));
      var lab=el('span',null,s[2]?'Confirmed with host':'Also offered');
      row.appendChild(lab);
      var when=el('span','cwhen',s[0]+' · '+s[1]);row.appendChild(when);
      w.appendChild(row);
    });
    return w;
  }
  // zero-knowledge eligibility proof (documents never shared)
  function zkProof(){
    var w=el('div','zk-proof');
    var checks=[
      ['income','Income ≥ 2.5× rent','yes'],
      ['id','Identity valid','yes'],
      ['standing','No adverse records','yes']
    ];
    checks.forEach(function(c){
      var r=el('div','zk-row');
      var ic=el('span','zk-ic');
      var svg=makeSvg('M20 6 9 17l-5-5');ic.appendChild(svg);
      r.appendChild(ic);
      r.appendChild(el('b',null,c[1]));
      r.appendChild(el('span','yn',c[2]));
      w.appendChild(r);
    });
    var banner=el('div','zk-banner');
    var lock=makeSvgEl();
    lock.setAttribute('class','lk');lock.setAttribute('viewBox','0 0 24 24');
    lock.setAttribute('fill','none');lock.setAttribute('stroke','currentColor');lock.setAttribute('stroke-width','2');
    var p1=svgPath('M5 11h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1z');
    var p2=svgPath('M8 11V7a4 4 0 0 1 8 0v4');
    lock.appendChild(p1);lock.appendChild(p2);
    banner.appendChild(lock);
    banner.appendChild(document.createTextNode('Proof generated — documents never shared'));
    w.appendChild(banner);
    return w;
  }
  // host verifies the proof (sees only yes/no)
  function proofVerified(){
    var w=el('div');
    [['Proof','Eligibility · zero-knowledge'],['Result','Valid ✓'],['Host sees','Yes / no only'],['Raw documents','Never disclosed']].forEach(function(kv){
      var r=el('div','kv');r.appendChild(el('span',null,kv[0]));var b=el('b',null,kv[1]);
      if(kv[0]==='Result')b.style.color='var(--green-ink)';r.appendChild(b);w.appendChild(r);
    });
    var p=el('div');p.style.marginTop='8px';
    var g=el('span','pill p-green');g.appendChild(document.createTextNode('Host approved — no PII exposed'));p.appendChild(g);w.appendChild(p);
    return w;
  }
  // anchor signed-lease hash for tamper-proof history
  function anchored(){
    var w=el('div');
    var r=el('div','hashrow');
    r.appendChild(document.createTextNode('lease #P-2041 · sha256 '));
    var b=el('b',null,'9f2a…4c7e');r.appendChild(b);
    w.appendChild(r);
    var p=el('div');p.style.marginTop='9px';
    var g=el('span','pill p-green');g.appendChild(document.createTextNode('Anchored — tamper-proof'));
    var b2=el('span','pill p-blue');b2.style.marginLeft='7px';b2.appendChild(document.createTextNode('Property history'));
    p.appendChild(g);p.appendChild(b2);w.appendChild(p);
    return w;
  }
  function guarantee(){
    var w=el('div');
    var r=el('div','kv');r.appendChild(el('span',null,'Owner payout'));r.appendChild(el('b',null,'By the 5th'));w.appendChild(r);
    var r2=el('div','kv');r2.appendChild(el('span',null,'Processor'));r2.appendChild(el('b',null,'Licensed'));w.appendChild(r2);
    var p=el('div');p.style.marginTop='8px';var g=el('span','pill p-green');g.appendChild(document.createTextNode('Guaranteed — paid even if the tenant is late'));p.appendChild(g);w.appendChild(p);return w;
  }
  function credit(){
    var w=el('div');
    var r=el('div','kv');r.appendChild(el('span',null,'Reporting to'));r.appendChild(el('b',null,'Equifax · TransUnion'));w.appendChild(r);
    var p=el('div');p.style.marginTop='8px';var g=el('span','pill p-blue');g.appendChild(document.createTextNode('On-time rent → building Canadian credit'));p.appendChild(g);w.appendChild(p);return w;
  }
  function ownerView(){
    var w=el('div');
    [['Next payout','By Apr 5'],['Status','Guaranteed'],['Tenant','Verified by proof'],['Collection','Automated by agent'],['If tenant is late','Propty covers it']].forEach(function(kv){
      var r=el('div','kv');r.appendChild(el('span',null,kv[0]));r.appendChild(el('b',null,kv[1]));w.appendChild(r);});
    return w;
  }

  // ---- scenarios ----
  var ROOMS=[
    {name:'Room 2 · 21 Fern Ave',meta:'Roncesvalles · 6-min transit',tag:'in budget'},
    {name:'Room A · 88 Gladstone',meta:'Little Portugal · 4-min transit',tag:'in budget'},
    {name:'Suite 1 · 12 Argyle',meta:'Trinity-Bellwoods · furnished',tag:'in budget'}
  ];
  function setChips(list){
    clr(chips);
    list.forEach(function(c){var b=el('button','chip',c.label);b.addEventListener('click',function(){c.run();});chips.appendChild(b);});
  }
  function findFlow(){
    setChips([]);
    userMsg("I just landed in Toronto for a new job. No Canadian credit yet — I need a room near transit within budget.");
    say("On it. I'll run the whole thing — search, book a viewing, verify you privately, draft the lease, and set up the rent guarantee.",420);
    act('search_rooms','{ city:"Toronto", near_transit:true }',function(){return rooms(ROOMS,-1);},760);
    say("Found 4 verified rooms in budget. Let's get you in to see the best fit — I'll book a viewing slot with the host.",300);
    act('schedule_viewing','{ listing:"21 Fern Ave", via:"calendar" }',calendar,760);
    say("Viewing confirmed for Saturday 10:00 AM. Since you're new to Canada, I'll verify you without a credit score — and without sending your documents to the host.",320);
    act('screen_tenant','{ docs:["passport","job_offer","bank_statements","reference"] }',verified,820);
    say("Your documents stay with me. Instead of sharing them, I generate a zero-knowledge proof the host can check.",280);
    act('generate_zk_proof','{ income:">= 2.5x rent", identity:"valid" }',zkProof,860);
