<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Aconomy - Revolutionizing Physical Asset Marketplace</title>
    <script type="module" crossorigin src="./assets/index-B0FRzak4.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DiPaiahG.css">
  </head>
  <body>
    <div id="app"></div>
    <style>
      /* --- Injected header + scroll chip (aconomy.foundation teal aesthetic) --- */
      :root{--acx-teal:#00abbe;--acx-ink:#0f2b33;--acx-h:64px}
      body{padding-top:var(--acx-h)}
      .acx-spacer{height:var(--acx-h)}
      .acx-header{position:fixed;top:0;left:0;right:0;z-index:100000;height:var(--acx-h);
        display:flex;align-items:center;justify-content:space-between;gap:16px;
        padding:0 clamp(14px,3vw,28px);box-sizing:border-box;
        background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
        border-bottom:1px solid rgba(0,171,190,.16);box-shadow:0 1px 14px rgba(15,43,51,.06);
        font-family:Figtree,system-ui,sans-serif}
      .acx-left,.acx-right{display:flex;align-items:center;gap:10px;min-width:0}
      .acx-brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none;
        color:var(--acx-ink);font-weight:800;font-size:19px;letter-spacing:-.01em;white-space:nowrap}
      .acx-brand .acx-logo{width:26px;height:26px;flex:0 0 auto}
      .acx-back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;
        color:var(--acx-teal);font-weight:600;font-size:14px;white-space:nowrap;
        padding:7px 12px;border-radius:999px;border:1px solid rgba(0,171,190,.35);
        transition:background .15s,transform .15s}
      .acx-back:hover{background:rgba(0,171,190,.10);transform:translateY(-1px)}
      .acx-sep{width:1px;height:26px;background:rgba(15,43,51,.12);margin:0 2px}
      .acx-btn{display:inline-flex;align-items:center;gap:7px;text-decoration:none;
        font-weight:600;font-size:14px;padding:9px 15px;border-radius:999px;white-space:nowrap;
        transition:transform .15s,box-shadow .15s,background .15s}
      .acx-btn:hover{transform:translateY(-1px)}
      .acx-btn-play{background:var(--acx-ink);color:#fff;box-shadow:0 6px 16px rgba(15,43,51,.18)}
      .acx-btn-play:hover{box-shadow:0 8px 20px rgba(15,43,51,.26)}
      .acx-btn-vid{background:var(--acx-teal);color:#fff;box-shadow:0 6px 16px rgba(0,171,190,.28)}
      .acx-btn-vid:hover{box-shadow:0 8px 20px rgba(0,171,190,.38)}
      .acx-gh{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;
        color:var(--acx-ink);width:38px;height:38px;border-radius:50%;
        border:1px solid rgba(15,43,51,.14);transition:background .15s,transform .15s}
      .acx-gh:hover{background:rgba(15,43,51,.06);transform:translateY(-1px)}
      /* Scroll-revealed bottom-left back chip (hidden at top) */
      .acx-scrollchip{position:fixed;bottom:18px;left:18px;z-index:99999;
        display:inline-flex;align-items:center;gap:6px;text-decoration:none;
        background:rgba(15,43,51,.92);color:#fff;font-weight:600;font-size:14px;
        font-family:Figtree,system-ui,sans-serif;padding:10px 15px;border-radius:999px;
        backdrop-filter:blur(6px);box-shadow:0 8px 22px rgba(0,0,0,.20);white-space:nowrap;
        opacity:0;visibility:hidden;transform:translateY(10px);
        transition:opacity .2s ease,transform .2s ease,visibility .2s}
      .acx-scrollchip.is-visible{opacity:1;visibility:visible;transform:translateY(0)}
      .acx-scrollchip:hover{transform:translateY(-1px)}
      @media (max-width:640px){
        :root{--acx-h:58px}
        .acx-back,.acx-sep{display:none}
        .acx-btn span.acx-label{display:none}
        .acx-btn{padding:9px 11px}
        .acx-brand{font-size:17px}
      }
    </style>
    <header class="acx-header">
      <div class="acx-left">
        <a class="acx-brand" href="./index.html" aria-label="Aconomy home">
          <img class="acx-logo" src="./icon.svg" alt="" aria-hidden="true" />
          <span>Aconomy</span>
        </a>
        <a class="acx-back" href="../index.html" aria-label="Back to Pandora Finance">&larr;&nbsp;Pandora Finance</a>
      </div>
      <div class="acx-right">
        <a class="acx-btn acx-btn-play" href="https://play.google.com/store/apps/details?id=com.aconomyfoundation.aconomy" target="_blank" rel="noopener" aria-label="Get the Aconomy app on Google Play"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3.5v17l13-8.5-13-8.5z"/></svg><span class="acx-label">Get it on Google Play</span></a>
        <a class="acx-btn acx-btn-vid" href="https://www.youtube.com/watch?v=_Kahfb18HE4" target="_blank" rel="noopener" aria-label="Watch the Aconomy brand film"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7L8 5z"/></svg><span class="acx-label">Watch the film</span></a>
        <span class="acx-sep" aria-hidden="true"></span>
        <a class="acx-gh" href="https://github.com/Pandora-Finance/aconomy-contract" target="_blank" rel="noopener" aria-label="Aconomy contracts on GitHub"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.93.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/></svg></a>
      </div>
    </header>
    <a class="acx-scrollchip" href="../index.html" aria-label="Back to Pandora Finance">&larr;&nbsp;Pandora Finance</a>
    <script>
      (function(){
        var chip=document.querySelector('.acx-scrollchip');
        if(!chip)return;
        function onScroll(){
          if(window.scrollY>240){chip.classList.add('is-visible');}
          else{chip.classList.remove('is-visible');}
        }
        window.addEventListener('scroll',onScroll,{passive:true});
        onScroll();
      })();
    </script>
    <!-- Injected: Aconomy product-screens showcase (inserted before the app footer once rendered) -->
    <style>
      #aco-screens{background:#f6f8fc;padding:clamp(48px,7vw,92px) 20px;text-align:center;font-family:'Figtree',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
      #aco-screens .aco-in{max-width:1000px;margin:0 auto}
      #aco-screens .aco-k{font-weight:700;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:#00abbe}
      #aco-screens h2{font-size:clamp(1.6rem,3.4vw,2.5rem);margin:12px 0 10px;color:#0b1834;font-weight:800;letter-spacing:-.02em;line-height:1.08}
      #aco-screens p{color:#5a6a85;margin:0 auto 30px;max-width:52ch;font-size:1.05rem;line-height:1.6}
      #aco-screens figure{margin:0;border-radius:22px;overflow:hidden;border:1px solid #e6eaf2;box-shadow:0 26px 64px rgba(16,32,64,.13)}
      #aco-screens img{width:100%;display:block}
    </style>
    <script>
      (function(){
        function build(){
          var sec=document.createElement('section'); sec.id='aco-screens';
          var inn=document.createElement('div'); inn.className='aco-in';
          var k=document.createElement('div'); k.className='aco-k'; k.textContent='Aconomy in action'; inn.appendChild(k);
          var h=document.createElement('h2'); h.textContent='Tokenize, validate and trade — from your phone.'; inn.appendChild(h);
          var p=document.createElement('p'); p.textContent='The RWA marketplace and its AI asset-validation agent, working end to end.'; inn.appendChild(p);
          var fig=document.createElement('figure');
          var img=document.createElement('img'); img.src='media/screens.gif';
          img.alt='Aconomy product screens — the RWA marketplace and the AI asset-validation agent';
          img.loading='lazy'; img.decoding='async';
          fig.appendChild(img); inn.appendChild(fig); sec.appendChild(inn);
          return sec;
        }
        var tries=0;
        var iv=setInterval(function(){
          tries++;
          var f=document.querySelector('#app footer.footer-section, #app footer');
          if(f){ clearInterval(iv); if(!document.getElementById('aco-screens')){ f.parentNode.insertBefore(build(), f); } }
          else if(tries>50){ clearInterval(iv); }
        },150);
      })();
    </script>
  </body>
</html>
